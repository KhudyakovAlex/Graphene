<!doctype html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphene Examples</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="shortcut icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./dist/graphene-examples.css">
  <script>
    let savedTheme = null;

    try {
      savedTheme = localStorage.getItem('graphene-theme');
    } catch {
      savedTheme = null;
    }

    if (savedTheme === 'dark' || savedTheme === 'light') {
      document.documentElement.dataset.theme = savedTheme;
    }
  </script>
</head>
<body>
  <div id="app"></div>
  <script src="./dist/graphene-examples.js"></script>
</body>
</html>
